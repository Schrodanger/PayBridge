# OpenTelemetry Collector configuration for PayBridge.
#
# Receivers:  OTLP over gRPC (4317) and HTTP (4318) — all services push here.
# Processors: batch (efficiency), memory_limiter (stop OOMs under load), resource
#             (stamp environment), attributes (drop the few high-cardinality fields
#             we don't want hitting the backend or our future cost line).
# Exporters:  OTLP to Aspire Dashboard (single UI for traces/metrics/logs); debug
#             exporter is commented out — flip it on locally if a span is missing.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64

  batch:
    send_batch_size: 512
    timeout: 2s

  resource:
    attributes:
      - key: deployment.environment
        value: local
        action: upsert

  # Strip a couple of attributes that are noisy / high-cardinality at scale.
  # PII masking already happens at the application boundary; this is a second line of defence.
  attributes:
    actions:
      - key: http.request.header.authorization
        action: delete
      - key: http.request.header.cookie
        action: delete

exporters:
  otlp/aspire:
    endpoint: aspire-dashboard:18889
    tls:
      insecure: true

  # debug:
  #   verbosity: detailed

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, attributes, batch]
      exporters: [otlp/aspire]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp/aspire]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp/aspire]
  telemetry:
    logs:
      level: info
